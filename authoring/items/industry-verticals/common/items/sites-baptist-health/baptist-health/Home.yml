    - ID: "d3886445-9ee0-46a0-ae5e-8857dd6b395f"
      Hint: pageSummary
      Value: "Baptist Health South Florida is a leading not-for-profit healthcare network serving communities throughout South Florida. The home page highlights easy access to care — from virtual and urgent care options to specialist appointments and patient resources — backed by expert physicians, advanced medical technology, and a deep commitment to compassionate, personalized health services. With a comprehensive network of hospitals, outpatient centers and digital tools like the PineApp for 24/7 access to care, the organization promotes whole-person health and trusted care close to home."
