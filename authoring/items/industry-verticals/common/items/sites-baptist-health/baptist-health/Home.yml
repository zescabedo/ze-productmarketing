      Hint: metadataDescription
      Value: "Baptist Health South Florida offers world-class medical care with 12 hospitals, advanced treatments in cancer, heart, brain & orthopedic care, urgent and primary care, virtual appointments, and compassionate patient-centered support across Miami-Dade, Broward, Palm Beach, and Monroe counties. Schedule care, find a doctor, access patient resources and manage health online."
